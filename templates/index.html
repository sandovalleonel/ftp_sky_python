<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTP Explorer - Toshiba 4690 (TCxSky)</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <header>
        <div class="title">FTP Explorer</div>
        <div style="display: flex; align-items: center;">
            <div class="connection-info" id="connection-status">No conectado</div>
            <button class="btn btn-secondary" style="padding: 4px 8px; margin-left: 15px; font-size: 0.8rem;"
                onclick="app.logout()">Cerrar sesión</button>
        </div>
    </header>

    <div class="explorer-container">
        <!-- Árbol de directorios -->
        <div class="sidebar" id="sidebar-tree">
            <!-- Diskos y arbol se renderiza aca -->
        </div>

        <!-- Panel Principal -->
        <div class="main-panel" id="main-panel">
            <div class="dropzone-overlay">Suelta archivos para subir a esta carpeta</div>

            <div class="actions-bar">
                <div class="path-breadcrumb" id="current-path">/</div>
                <button class="btn btn-secondary" onclick="app.refreshCurrentFolder()">Refrescar</button>
                <button class="btn btn-primary" onclick="app.triggerCreateModal()">Nuevo Elemento</button>
                <button class="btn btn-primary" onclick="app.triggerUploadModal()">Subir Archivos</button>
                <button class="btn btn-primary" onclick="app.downloadCurrentFolder()">Descargar Carpeta (.zip)</button>
            </div>

            <table class="file-table" id="file-table">
                <thead>
                    <tr>
                        <th width="50%">Nombre</th>
                        <th width="30%">Tipo</th>
                        <th width="20%" style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="file-list">
                    <!-- Vista por defecto -->
                    <tr>
                        <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 30px;">Selecciona
                            una carpeta en el panel izquierdo</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modals -->
    <!-- Modal Login -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Conectar a Servidor Toshiba</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>IP del Servidor (Host)</label>
                    <input type="text" id="ftp-host" required value="192.168.0.100">
                </div>
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="ftp-user" required value="pos34">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="ftp-pass">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Conectar</button>
            </form>
        </div>
    </div>

    <!-- Modal Upload -->
    <div id="upload-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Subir</h2>
            <p style="margin-bottom: 10px; font-size: 0.9em; color: var(--text-muted);">Destino: <span
                    id="upload-dest-path"></span></p>
            <div class="form-group" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="radio" name="upload-type" value="files" checked onchange="app.toggleUploadType()"> Archivos
                </label>
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="radio" name="upload-type" value="folder" onchange="app.toggleUploadType()"> Carpeta
                </label>
            </div>
            <input type="file" id="file-input" multiple style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn btn-secondary" onclick="app.hideUploadModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="app.uploadFiles()">Subir</button>
            </div>
        </div>
    </div>

    <!-- Modal Editor de Texto -->
    <div id="editor-modal" class="modal-overlay hidden">
        <div class="modal-content large">
            <h2 id="editor-title">Editor / Visor</h2>
            <div class="editor-container">
                <div id="line-numbers"></div>
                <textarea id="file-editor" spellcheck="false"></textarea>
            </div>
            <div class="editor-actions">
                <button class="btn btn-secondary" onclick="app.closeEditor()">Cerrar</button>
                <button id="save-btn" class="btn btn-primary" onclick="app.saveCurrentFile()">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <!-- Modal Renombrar -->
    <div id="rename-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Renombrar</h2>
            <p style="margin-bottom: 10px; font-size: 0.9em; color: var(--text-muted);">Elemento: <span
                    id="rename-old-name-display"></span></p>
            <div class="form-group">
                <input type="text" id="rename-new-name" required
                    onkeydown="if(event.key === 'Enter') app.confirmRename()">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn btn-secondary" onclick="app.hideRenameModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="app.confirmRename()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Nuevo Elemento -->
    <div id="create-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Crear Nuevo Elemento</h2>
            <p style="margin-bottom: 10px; font-size: 0.9em; color: var(--text-muted);">Destino: <span
                    id="create-dest-display"></span></p>
            <div class="form-group" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="radio" name="create-type" value="folder"> Carpeta
                </label>
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="radio" name="create-type" value="file" checked> Archivo
                </label>
            </div>
            <div class="form-group">
                <input type="text" id="create-item-name" placeholder="Nombre (puede no tener extensión)" required
                    onkeydown="if(event.key === 'Enter') app.confirmCreate()">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn btn-secondary" onclick="app.hideCreateModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="app.confirmCreate()">Crear</button>
            </div>
        </div>
    </div>

    <!-- Toasts Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Progress Indicator -->
    <style>
        .progress-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .progress-container.hidden { display: none; }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #333;
            font-weight: 500;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.2s ease;
        }
    </style>
    <div id="progress-container" class="progress-container hidden">
        <div class="progress-info">
            <span id="progress-text">Procesando...</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
    </div>

    <script src="/static/js/explorer.js?v=4"></script>
</body>

</html>
